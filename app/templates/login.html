<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitAI — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F1F5F9;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#0F0E1A}

/* mesh background */
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 40% at 0% 0%,rgba(13,148,136,0.10) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 100% 0%,rgba(14,164,233,0.267) 0%,transparent 50%),radial-gradient(ellipse 40% 30% at 50% 100%,rgba(99,101,241,0.2) 0%,transparent 50%)}

.card{position:relative;z-index:1;background:linear-gradient(145deg,#ffffff 0%,#F5F3FF 60%,#FDF2F8 100%);border:1px solid #DDD8FF;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(15,14,26,0.12),0 4px 16px rgba(13,148,136,0.08)}

.logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#0D9488,#14B8A6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:26px;color:#fff;box-shadow:0 2px 8px rgba(13,148,136,0.3)}
h1{font-size:20px;font-weight:700;text-align:center;color:#0F0E1A;font-family:'Bricolage Grotesque',sans-serif}
.sub{font-size:13px;color:#9B9BAD;text-align:center;margin-top:4px}

.tabs{display:flex;background:linear-gradient(135deg,#EEF0FF,#FDF2F8);border:1px solid #DDD8FF;border-radius:10px;padding:4px;margin:1.5rem 0}
.tab{flex:1;padding:8px;border:none;background:transparent;color:#9B9BAD;font-size:13px;cursor:pointer;border-radius:7px;font-family:'DM Sans',sans-serif;transition:all .2s}
.tab.active{background:linear-gradient(135deg,#0D9488,#14B8A6);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(13,148,136,0.3)}

.field{margin-bottom:1rem}
label{font-size:12px;color:#6B6B80;display:block;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;background:#E2E8F0;border:1px solid #E4E3F0;border-radius:8px;color:#0F0E1A;padding:10px 12px;font-size:13.5px;font-family:'DM Sans',sans-serif;transition:all .2s;outline:none}
input:focus{border-color:#0D9488;background:#fff;box-shadow:0 0 0 3px rgba(13,148,136,0.15)}

.btn{width:100%;padding:12px;background:linear-gradient(135deg,#0D9488,#14B8A6);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:0.5rem;transition:all .2s;box-shadow:0 4px 14px rgba(13,148,136,0.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(13,148,136,0.35)}

.flash{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem}
.form-section{display:none}
.form-section.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-flame"></i></div>
    <h1>HabitAI</h1>
    <p class="sub">Your AI-powered habit coach</p>
  </div>
  {% with messages = get_flashed_messages() %}{% if messages %}
    <div class="flash">{{ messages[0] }}</div>
  {% endif %}{% endwith %}
  <div class="tabs">
    <button class="tab {% if mode=='login' %}active{% endif %}" onclick="show('login')">Sign in</button>
    <button class="tab {% if mode=='register' %}active{% endif %}" onclick="show('register')">Sign up</button>
  </div>
  <div class="form-section {% if mode=='login' %}active{% endif %}" id="f-login">
    <form method="POST" action="/login">
      <div class="field"><label>Email</label><input type="email" name="email" required placeholder="you@email.com"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required placeholder="••••••••"></div>
      <button class="btn" type="submit">Sign in</button>
    </form>
  </div>
  <div class="form-section {% if mode=='register' %}active{% endif %}" id="f-register">
    <form method="POST" action="/register">
      <div class="field"><label>Username</label><input type="text" name="username" required placeholder="yourname"></div>
      <div class="field"><label>Email</label><input type="email" name="email" required placeholder="you@email.com"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required placeholder="••••••••"></div>
      <button class="btn" type="submit">Create account</button>
    </form>
  </div>
</div>
<script>
function show(t){
  document.querySelectorAll('.form-section,.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('f-'+t).classList.add('active');
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===t));
}
</script>
</body>
</html>
